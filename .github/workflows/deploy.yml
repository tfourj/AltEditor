name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v4
        id: pages

      - name: Determine base path
        id: base
        run: |
          url="${{ steps.pages.outputs.base_url }}"
          path=$(echo "$url" | sed 's|^https\?://[^/]*||')
          if [ -z "$path" ]; then path="/"; fi
          if [[ ! "$path" =~ /$ ]]; then path="${path}/"; fi
          echo "base_path=$path" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          npx tsc -b
          npx vite build --base "${{ steps.base.outputs.base_path }}"
        env:
          VITE_ENABLE_IMAGE_UPLOAD: ${{ vars.VITE_ENABLE_IMAGE_UPLOAD || 'false' }}
          VITE_IMGUR_CLIENT_ID: ${{ secrets.VITE_IMGUR_CLIENT_ID || '' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
